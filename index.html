<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackIt Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- main app container -->
    <div class="container">

        <!-- top header with title -->
        <header class="header">
            <h1>TrackIt</h1>
            <p class="subtitle">simple personal finance tracker</p>

            <!-- dark mode button placeholder -->
            <button id="dark-mode-btn">dark mode</button>
        </header>


        <!-- summary cards showing totals -->
        <section class="summary">

            <!-- total balance -->
            <div class="card">
                <h3>balance</h3>
                <p id="balance">$0.00</p>
            </div>

            <!-- total income -->
            <div class="card income-card">
                <h3>income</h3>
                <p id="income">$0.00</p>
            </div>

            <!-- total expenses -->
            <div class="card expense-card">
                <h3>expenses</h3>
                <p id="expenses">$0.00</p>
            </div>

            <!-- savings card -->
            <div class="card">
                <h3>savings</h3>
                <p id="savings">$0.00</p>
            </div>

        </section>


        <!-- add transaction section -->
        <section class="form-section">

            <h2>add transaction</h2>

            <form id="transaction-form">

                <!-- description -->
                <div class="form-group">
                    <label for="description">description</label>
                    <input type="text" id="description" placeholder="ex. groceries" required>
                </div>

                <!-- amount -->
                <div class="form-group">
                    <label for="amount">amount</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                </div>

                <!-- income or expense -->
                <div class="form-group">
                    <label for="type">type</label>
                    <select id="type" required>
                        <option value="">select</option>
                        <option value="income">income</option>
                        <option value="expense">expense</option>
                    </select>
                </div>

                <!-- category -->
                <div class="form-group">
                    <label for="category">category</label>
                    <select id="category" required>
                        <option value="">select</option>
                        <option value="salary">salary</option>
                        <option value="food">food</option>
                        <option value="transport">transport</option>
                        <option value="shopping">shopping</option>
                        <option value="bills">bills</option>
                        <option value="entertainment">entertainment</option>
                        <option value="health">health</option>
                        <option value="other">other</option>
                    </select>
                </div>

                <!-- date -->
                <div class="form-group">
                    <label for="date">date</label>
                    <input type="date" id="date">
                </div>

                <!-- notes -->
                <div class="form-group">
                    <label for="notes">notes</label>
                    <textarea id="notes" rows="3" placeholder="optional note"></textarea>
                </div>

                <!-- add button -->
                <button type="submit">add transaction</button>

            </form>

        </section>


        <!-- filter controls -->
        <section class="filter-section">

            <h2>filters</h2>

            <!-- search -->
            <input type="text" id="search" placeholder="search transactions">

            <!-- filter buttons -->
            <div class="filters">
                <button class="filter-btn" data-filter="all">all</button>
                <button class="filter-btn" data-filter="income">income</button>
                <button class="filter-btn" data-filter="expense">expense</button>
            </div>

            <!-- sorting -->
            <div class="sort">
                <label for="sort">sort by</label>
                <select id="sort">
                    <option value="newest">newest</option>
                    <option value="oldest">oldest</option>
                    <option value="highest">highest amount</option>
                    <option value="lowest">lowest amount</option>
                </select>
            </div>

        </section>


        <!-- transaction list -->
        <section class="transactions">

            <h2>transaction history</h2>

            <ul id="transaction-list">
                <!-- transactions will show here -->
            </ul>

        </section>


        <!-- simple insights section -->
        <section class="insights">

            <h2>insights</h2>

            <!-- small messages based on spending -->
            <p id="insight-one">add some transactions to see insights</p>
            <p id="insight-two"></p>
            <p id="insight-three"></p>

        </section>


        <!-- chart placeholder -->
        <section class="charts">

            <h2>spending overview</h2>

            <!-- this can become a chart later -->
            <div class="chart-placeholder">
                chart will go here later
            </div>

        </section>


        <!-- extra actions -->
        <section class="actions">

            <h2>extra actions</h2>

            <button id="export-btn">export data</button>
            <button id="clear-btn">clear all transactions</button>
            <button id="reset-btn">reset app</button>

        </section>


        <!-- footer -->
        <footer class="footer">
            <p>trackit finance tracker</p>
        </footer>

    </div>

    <!-- javascript file -->
    <script src="script.js"></script>

</body>
</html>
